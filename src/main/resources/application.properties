spring.application.name=LetsSplitIt

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5432/letssplitit
spring.datasource.username=letssplitit
spring.datasource.password=letssplitit

# --- JPA / Hibernate ---
# `update` = auto-create/alter tables from entities. Fine for dev, swap to `validate` + Flyway in prod.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- JWT ---
jwt.secret=TGV0c1NwbGl0SXRTZWNyZXRGb3JKd3RUb2tlbkF1dGg=
jwt.expiration-ms=86400000

# --- CORS ---
app.cors.allowed-origins=http://localhost:3000

# --- Bootstrap Admin ---
# On startup: if no ADMIN exists, one is auto-created with this email and a random password
# printed in the logs. Change the password on first login.
app.admin.email=admin@letssplitit.local
app.admin.name=Administrator
